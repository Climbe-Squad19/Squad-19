name: Climbe — CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:

  build:
    name: Build e Testes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build e testes com Maven
        run: mvn -B verify --file gestao-contratos/pom.xml
        env:
          SPRING_PROFILES_ACTIVE: local
      - name: Salvar JAR como artefato
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: gestao-contratos/target/*.jar
          retention-days: 1

  docker:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Definir tag da imagem
        id: tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "TAG=latest" >> $GITHUB_OUTPUT
          else
            echo "TAG=develop" >> $GITHUB_OUTPUT
          fi
      - name: Build e push da imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: ./gestao-contratos
          file: ./gestao-contratos/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/climbe-api:${{ steps.tag.outputs.TAG }}

  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Instalar dependências
        working-directory: frontend
        run: npm ci
      - name: Build do frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.API_URL_PROD }}