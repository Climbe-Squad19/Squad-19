# MySQL 8+ (produção ou dev com servidor local)
# Crie o schema antes ou use createDatabaseIfNotExist na URL.
#
# Dev local com Vite em várias portas (sobrescreva CORS_ALLOWED_ORIGINS em produção).
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}

spring.datasource.url=${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/climbe?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=${MYSQL_POOL_SIZE:10}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# Schema vem do SQL (Flyway + climbe_db.sql); use "update" só em emergência local
spring.jpa.hibernate.ddl-auto=${MYSQL_JPA_DDL_AUTO:validate}
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Health do Render/K8s: sem SMTP, o indicador de e-mail derruba o status global
management.health.mail.enabled=${MANAGEMENT_HEALTH_MAIL_ENABLED:false}

# --- E-mail Gmail (notificações / recuperação de senha) ---
# SMTP (recomendado para teste): conta Gmail + senha de app (Google → Segurança → senhas de app)
#   MAIL_USERNAME=seu@gmail.com  MAIL_APP_PASSWORD=xxxx  MAIL_FROM=seu@gmail.com  MAIL_PROVIDER=gmail.com
# Opcional: MAIL_TEST_ENDPOINT_ENABLED=true e POST /notificacoes/teste-email com JWT após login
app.mail.test-endpoint-enabled=${MAIL_TEST_ENDPOINT_ENABLED:false}

# --- Arquivos: Supabase Storage (API S3) ---
# Painel Supabase → Project Settings → Storage → S3 access keys
# Endpoint: https://<project-ref>.storage.supabase.co/storage/v1/s3
# Região na assinatura AWS SDK: normalmente us-east-1
# Bucket público (URL no app): https://<project-ref>.supabase.co/storage/v1/object/public/<nome-do-bucket>
#
# Ligue com: S3_ENABLED=true ou SUPABASE_STORAGE_ENABLED=true (e preencha bucket, endpoint e chaves).
app.s3.enabled=${S3_ENABLED:${SUPABASE_STORAGE_ENABLED:false}}
app.s3.region=${AWS_REGION:us-east-1}
app.s3.bucket=${S3_BUCKET:${SUPABASE_STORAGE_BUCKET:}}
app.s3.access-key=${AWS_ACCESS_KEY_ID:${SUPABASE_S3_ACCESS_KEY:}}
app.s3.secret-key=${AWS_SECRET_ACCESS_KEY:${SUPABASE_S3_SECRET_KEY:}}
app.s3.endpoint=${S3_ENDPOINT:${SUPABASE_S3_ENDPOINT:}}
app.s3.path-style=${S3_PATH_STYLE:false}
app.s3.public-url-base=${S3_PUBLIC_URL_BASE:${SUPABASE_STORAGE_PUBLIC_URL_BASE:}}
