# PORT (Render/Heroku) ou local padrão 8081
server.port=${PORT:${SERVER_PORT:8081}}

# local = H2 em memória (dev/CI) | mysql = MySQL 8+ (produção ou máquina local)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Configuração JWT necessária para a nova camada de segurança
jwt.secret=${JWT_SECRET:climbe-gestao-contratos-secret-key-2026}
jwt.expiration=86400000

# SMTP Gmail ("gmail.com" usa SMTP, sem API paga)
app.mail.provider=${MAIL_PROVIDER:gmail.com}
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:${spring.mail.username:}}

# POST /notificacoes/teste-email (requer JWT) — desligado por padrão
app.mail.test-endpoint-enabled=${MAIL_TEST_ENDPOINT_ENABLED:false}

# Gmail API (OAuth2) - usado quando app.mail.provider=gmail-api
app.gmail.api.access-token=${GMAIL_API_ACCESS_TOKEN:}

# Google OAuth para integrações (Drive, Calendar, Sheets, Gmail)
app.integrations.google.client-id=${GOOGLE_CLIENT_ID:}
app.integrations.google.client-secret=${GOOGLE_CLIENT_SECRET:}
app.integrations.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8081/integracoes/google/callback}
# Login com Google (Authorization Code + PKCE) — registrar esta URL no Google Cloud Console
app.integrations.google.login-redirect-uri=${GOOGLE_LOGIN_REDIRECT_URI:http://localhost:8081/auth/google/callback}
app.integrations.google.calendar-timezone=${GOOGLE_CALENDAR_TIMEZONE:America/Sao_Paulo}

# URL do frontend (recuperação de senha, OAuth redirect)
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

# CORS: origens separadas por vírgula (ex.: https://meu-app.onrender.com,http://localhost:5173)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# --- Armazenamento de arquivos (API S3-compatível) ---
# Produção com Supabase Storage: use SUPABASE_* (ver application-mysql.properties).
app.s3.region=${AWS_REGION:us-east-1}
app.s3.bucket=${S3_BUCKET:${SUPABASE_STORAGE_BUCKET:}}
app.s3.access-key=${AWS_ACCESS_KEY_ID:${SUPABASE_S3_ACCESS_KEY:}}
app.s3.secret-key=${AWS_SECRET_ACCESS_KEY:${SUPABASE_S3_SECRET_KEY:}}
app.s3.endpoint=${S3_ENDPOINT:${SUPABASE_S3_ENDPOINT:}}
app.s3.path-style=${S3_PATH_STYLE:false}
app.s3.public-url-base=${S3_PUBLIC_URL_BASE:${SUPABASE_STORAGE_PUBLIC_URL_BASE:}}

# Limites de upload (PDF, imagens, etc.)
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:10MB}

# Health (teste rápido do banco: GET /actuator/health — componente "db")
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=${MANAGEMENT_HEALTH_DETAILS:never}

# Flyway: desligado por padrão (perfil local = H2). Perfil mysql liga e aplica db/migration + climbe_db.sql
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
