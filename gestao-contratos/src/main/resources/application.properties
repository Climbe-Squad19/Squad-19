# Ambiente local de desenvolvimento sem dependência de banco externo
server.port=8081

spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Configuração JWT necessária para a nova camada de segurança
jwt.secret=climbe-gestao-contratos-secret-key-2026
jwt.expiration=86400000

# URL para integração de API externa (substituir por endpoint real)
external.api.base-url=https://api.example.com
