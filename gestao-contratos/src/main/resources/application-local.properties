# Desenvolvimento / CI — banco em memória (H2); sem Flyway (schema via Hibernate create-drop)
spring.flyway.enabled=false
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Storage opcional (ex.: Supabase): S3_ENABLED=true ou SUPABASE_STORAGE_ENABLED=true + SUPABASE_S3_* / bucket
app.s3.enabled=${S3_ENABLED:${SUPABASE_STORAGE_ENABLED:false}}

# Teste de e-mail: POST /notificacoes/teste-email com Bearer token (após login)
app.mail.test-endpoint-enabled=true

# Google OAuth: arquivo gestao-contratos/.env (GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET) é lido no startup
# (LocalDotenvLoader). Opcional: ./run-dev.sh ou export no shell.
# Redirects locais (mesma porta do Spring, ex. 8081): /auth/google/callback e /integracoes/google/callback

# CORS em dev: qualquer porta do Vite (5173, 5174, …) em localhost / 127.0.0.1
app.cors.allowed-origins=http://localhost:*,http://127.0.0.1:*

# Detalhes do health (inclui status do DataSource) em dev
management.endpoint.health.show-details=always
# Sem MAIL_* configurado, o check de SMTP derruba o health — desliga só em dev local
management.health.mail.enabled=false
