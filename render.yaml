# Blueprint Render — ajuste nomes/URLs após o primeiro deploy.
# MySQL: Render não oferece MySQL gerenciado; use PlanetScale, Railway, Aiven ou RDS
# e defina MYSQL_URL / MYSQL_USERNAME / MYSQL_PASSWORD no dashboard.
#
# Ordem sugerida:
# 1) Crie o banco MySQL online e rode climbe_db.sql (ou deixe o Flyway aplicar no start).
# 2) Deploy do serviço "climbe-api" e copie a URL pública (ex.: https://climbe-api.onrender.com).
# 3) Deploy do "climbe-web" com VITE_API_BASE_URL apontando para essa URL e rebuild.

services:
  - type: web
    name: climbe-api
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./gestao-contratos/Dockerfile
    dockerContext: ./gestao-contratos
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: mysql
      - key: PORT
        value: 8081
      - key: MYSQL_URL
        sync: false
      - key: MYSQL_USERNAME
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: APP_FRONTEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      # Callback do login com Google (PKCE) — ex.: https://SUA-API.onrender.com/auth/google/callback
      - key: GOOGLE_LOGIN_REDIRECT_URI
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

  - type: web
    name: climbe-api
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./gestao-contratos/Dockerfile
    dockerContext: ./gestao-contratos
    healthCheckPath: /actuator/health
